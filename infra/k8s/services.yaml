apiVersion: v1
kind: Service
metadata:
  name: map-qa-postgres
spec:
  selector:
    app: map-qa-postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: map-qa-backend
spec:
  type: ClusterIP
  selector:
    app: map-qa-backend
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: map-qa-frontend
spec:
  type: NodePort
  selector:
    app: map-qa-frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
