apiVersion: apps/v1
kind: Deployment
metadata:
  name: map-qa-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: map-qa-frontend
  template:
    metadata:
      labels:
        app: map-qa-frontend
    spec:
      containers:
        - name: frontend
          image: map-qa-frontend:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
