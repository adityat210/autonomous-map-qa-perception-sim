services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: mapqa
      POSTGRES_USER: mapqa
      POSTGRES_PASSWORD: mapqa
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql://mapqa:mapqa@postgres:5432/mapqa
      MAP_QA_DATA_DIR: /app/data/sample
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: http://localhost:8000
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres-data:
